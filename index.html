<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House Daisy-UI</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <!-- daisy-ui and tailwind link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- font-awsome link 0 -->
    <script src="https://kit.fontawesome.com/08550534dd.js" crossorigin="anonymous"></script>

    <!-- tailwind custom colors  -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark3: "#777777",
                        lf: "#FF8938",
                        lr: "#FF0000"
                    }
                }
            }
        }
    </script>



    <style>
        .manrope {
            font-family: "Manrope", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }
    </style>

</head>

<body class="manrope">
    <header>
        <div class="hero">
            <div class="hero-content flex-col lg:flex-row gap-0 lg:gap-4 ">
                <div class="px-3 lg:px-0 text-center lg:text-left lg:pr-32">
                    <h1 class="text-5xl font-bold">It's good <br>
                        tea time at The <br> Tea House</h1>
                    <p class="py-6 text-dark3">
                        Provident cupiditate voluptatem et in. Quaerat fugiat ut assumenda excepturi exercitationem
                        quasi. In deleniti eaque aut repudiandae et a id nisi.
                    </p>
                    <button class="btn bg-gradient-to-r from-lf to-lr text-xl text-white">Explore More</button>
                </div>
                <div class="relative mt-7">
                    <img class="bg-none" src="images/banner.png" class="max-w-sm rounded-lg shadow-2xl" />
                    <div class="flex justify-center items-center gap-3 bg-[#FFFFFF] shadow-xl px-3 py-5 w-56 rounded-xl absolute -mt-16">
                        <i class="fa-solid fa-star text-[#FFDC64] text-3xl"></i>
                        <div>
                            <h2 class="text-3xl font-extrabold">5.00</h2>
                            <p class="text-base font-semibold">Trust Pilot Ratings</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
